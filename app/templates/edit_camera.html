{% extends "base.html" %}
{% block title %}Edit Camera – Oyster CCTV{% endblock %}
{% block page_title %}Edit Camera{% endblock %}

{% block content %}
<div style="max-width:520px;">
  <div class="card">
    <div class="card-header">Edit: {{ cam.name }}</div>
    <div class="card-body">
      <form action="{{ url_for('settings.edit_camera', camera_id=cam.id) }}" method="post">

        <div class="form-group">
          <label class="form-label">Camera Name *</label>
          <input type="text" name="name" class="form-control" value="{{ cam.name }}" required>
        </div>

        <div class="form-group">
          <label class="form-label">IP Address *</label>
          <input type="text" name="ip_address" class="form-control" value="{{ cam.ip_address }}" required>
        </div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" value="{{ cam.username }}">
        </div>

        <div class="form-group">
          <label class="form-label">Camera Password <span class="text-muted">(leave blank to keep current)</span></label>
          <input type="password" name="password" class="form-control" placeholder="••••••">
        </div>

        <div class="form-group">
          <label class="form-label">RTSP URL</label>
          <input type="text" name="rtsp_url" class="form-control" value="{{ cam.rtsp_url }}">
        </div>

        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
          <input type="checkbox" name="is_active" id="is_active"
                 {{ 'checked' if cam.is_active }} style="width:18px;height:18px;accent-color:var(--color-primary);">
          <label for="is_active" class="form-label" style="margin:0;">Active</label>
        </div>

        <div class="flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{{ url_for('settings.index') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
